# CLD6001 - Podman Containers Configuration
# Container runtime configuration for security testing

[containers]
# Default container settings
default_capabilities = ["NET_BIND_SERVICE"]

# Default environment
default_env = ["PATH=/usr/local/bin:/usr/bin"]

# Default ulimits
default_ulimits = ["nofile=65536:65536", "nproc=65536:65536"]

# Default mount propagation
mounts = []

# Default sysctls
sysctls = []

# Default working directory
working_dir = "/app"

[engine]
# Engine configuration
rootless = true

# Default runtime
runtime = "crun"

# Default runtime args
runtime_args = ["--no-new-keyring"]

# Default environment
environment = ["PATH=/usr/local/bin:/usr/bin"]

# Default log driver
log_driver = "kubernetes"

# Default log format
log_format = "json"

# Default log tag
log_tag = "container:{{.ID}}"

# Default log level
log_level = "error"

# Default pull policy
pull_policy = "missing"

# Default max concurrent downloads
max_concurrent_downloads = 3

# Default timeout
timeout = 0

[registries]
# Registries configuration
insecure_registries = []

# Registries
registries = ["docker.io"]

[registries.search]
# Search registries
registries = ["docker.io"]

[registries.insecure]
# Insecure registries
registries = []
