# CLD6001 - Podman Storage Configuration
# Storage backend configuration for container security testing

[storage]
# Storage driver
driver = "overlay"

# Storage root directory (replace with the concrete target user's home path)
root = "<TARGET_HOME>/.local/share/containers/storage"

[storage.options]
# Mount program
mount_program = "/usr/bin/fuse-overlayfs"

# Mount program options
mount_program_options = [
    "nodev",
    "noatime",
    "noexec",
    "nosymfollow",
    "o=bind"
]

# Additional mount options
additional_mount_options = [
    "nodev",
    "noexec",
    "nosymfollow"
]

[storage.runroot]
# Runtime storage
runroot = "<TARGET_HOME>/.local/share/containers/storage"

[storage.graphdriver]
# Graph driver options
graphdriver = "fuse-overlayfs"
