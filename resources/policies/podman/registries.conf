# CLD6001 - Podman Registries Configuration
# Registry access configuration for container security testing
# Place at /etc/containers/registries.conf on the host

# Default registries for container image pulls
[registries]
registries = ["docker.io", "registry.access.redhat.com", "gcr.io"]

# Insecure registries (for lab testing ONLY - do not use in production)
[registries.insecure]
registries = []

# Registry-specific configuration
[[registry]]
# Official Docker Hub
prefixes = ["docker.io"]
location = "docker.io"
tlsverify = "required"
# Certificate authority
# tlsverify = "optional"  # For lab testing with self-signed certs

# Red Hat Registry (requires subscription)
[[registry]]
prefixes = ["registry.access.redhat.com"]
location = "registry.access.redhat.com"
tlsverify = "required"

# Google Container Registry
[[registry]]
prefixes = ["gcr.io"]
location = "gcr.io"
tlsverify = "required"

# Quay.io (CoreOS, Red Hat)
[[registry]]
prefixes = ["quay.io"]
location = "quay.io"
tlsverify = "required"

# Local test registry (for supply chain testing)
# Uncomment when setting up local registry
# [[registry]]
# prefixes = ["localhost:5000"]
# location = "localhost:5000"
# tlsverify = "optional"
# insecure = true
